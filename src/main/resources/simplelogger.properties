# Configuración de SLF4J Simple Logger
# Nivel mínimo a mostrar: TRACE < DEBUG < INFO < WARN < ERROR
org.slf4j.simpleLogger.defaultLogLevel=WARN

# Los logs de HikariCP solo en INFO (reduce ruido)
org.slf4j.simpleLogger.log.com.zaxxer.hikari=INFO

# Los logs de la aplicación en DEBUG durante desarrollo
org.slf4j.simpleLogger.log.com.hotel=DEBUG

# Formato: mostrar fecha/hora y nivel
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.levelInBrackets=true
