# ============================================================
# Configuración SMTP para envío de emails
#
# Para Gmail: habilita "Contraseñas de aplicación" en
#   Cuenta Google → Seguridad → Verificación en dos pasos
#   Luego genera una contraseña de app de 16 caracteres.
#
# Para otros proveedores ajusta host, port y starttls.
# ============================================================

# Servidor SMTP
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true

# Credenciales (sustituir con datos reales)
mail.usuario=TU_CORREO@gmail.com
mail.password=TU_CONTRASENA_DE_APP

# Remitente que aparece en el correo
mail.from.nombre=Hotel Vista
mail.from.email=TU_CORREO@gmail.com

# Timeout en ms
mail.smtp.connectiontimeout=5000
mail.smtp.timeout=5000
